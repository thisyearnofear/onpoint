# ============================================
# OnPoint Agent — Monitoring Stack
# ============================================
#
# Quick-start Prometheus + Grafana stack for the
# OnPoint agent metrics. Deploy on the Hetzner VPS
# alongside the Express API.
#
# Usage:
#   docker compose -f deploy/docker-compose.monitoring.yml up -d
#
# This launches:
#   - Prometheus on port 9090
#   - Grafana on port 3000 (admin / admin — change on first login)
#
# Data volumes persist in named Docker volumes:
#   - prometheus_data
#   - grafana_data
#
# Backup:
#   docker run --rm -v prometheus_data:/data -v $(pwd):/backup \
#     alpine tar czf /backup/prometheus-backup-$(date +%Y%m%d).tar.gz -C /data .
#
# Restore:
#   docker run --rm -v prometheus_data:/data -v $(pwd):/backup \
#     alpine tar xzf /backup/prometheus-backup-*.tar.gz -C /data

services:

  # ── Prometheus ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: onpoint-prometheus
    restart: unless-stopped
    # Use host networking so Prometheus can reach the Express API on
    # localhost:48751 (the API is NOT in a Docker container).
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-admin-api"
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Grafana ────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.2
    container_name: onpoint-grafana
    restart: unless-stopped
    # Use host networking to reach Prometheus on localhost:9090
    # and the API datasource on localhost:48751.
    network_mode: host
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Set MONITOR_DOMAIN to enable the public subdomain; defaults to localhost
      # e.g., MONITOR_DOMAIN=https://monitor.onpoint.famile.xyz
      - GF_SERVER_ROOT_URL=${MONITOR_DOMAIN:-https://monitor.onpoint.famile.xyz}
      # Only needed if Grafana is served behind a reverse proxy at a sub-path
      # - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  prometheus_data:
    name: onpoint-prometheus-data
  grafana_data:
    name: onpoint-grafana-data

